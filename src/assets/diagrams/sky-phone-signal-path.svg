idth="200" height="72"><div xmlns="http://www.w3.org/1999/xhtml" class="labelBkg" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="edgeLabel"><p>WebSocket: binary PCM frames<br />and JSON control events</p></span></div></foreignObject></g></g></g><g class="nodes"><g class="node default" id="diagram-sky-phone-signal-path-flowchart-caller-0" data-look="classic" transform="translate(138, 59)"><rect class="basic label-container" style="" x="-130" y="-51" width="260" height="102"/><g class="label" style="" transform="translate(-100, -36)"><rect/><foreignObject width="200" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Remote caller<br />a real GSM call to a real number</p></span></div></foreignObject></g></g><g class="node default" id="diagram-sky-phone-signal-path-flowchart-phone-1" data-look="classic" transform="translate(138, 223)"><rect class="basic label-container" style="" x="-130" y="-63" width="260" height="126"/><g class="label" style="" transform="translate(-100, -48)"><rect/><foreignObject width="200" height="96"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; line-height: 1.5; max-width: 200px; text-align: center; width: 200px;"><span class="nodeLabel"><p>Android phone with its own SIM<br />no root, no special app, no telephony API</p></span></div></foreignObject></g></g><g class="node default" id="diagram-sky-phone-signal-path-flowchart-gadget-3" data-look="classic" transform="translate(138, 459)"><rect class="basic label-container" style="" x="-130" y="-51" width="260" height="102"/><g class="label" style="" transform="translate(-100, -36)"><rect/><foreignObject width="200" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="display: table; white-space: break-spaces; li