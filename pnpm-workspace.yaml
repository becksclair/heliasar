packages:
  - .

onlyBuiltDependencies:
  - '@biomejs/biome'
  - '@parcel/watcher'
  - esbuild
  - sharp

allowBuilds:
  '@biomejs/biome': true
  '@parcel/watcher': true
  esbuild: true
  sharp: true

# Pin patched versions of transitive (build/dev-only) dependencies flagged by
# security advisories. All are same-major bumps. Revisit/remove as the parent
# packages (Astro, @astrojs/vercel, @astrojs/check) update their own deps.
overrides:
  'ajv@6': '^6.14.0'
  mdast-util-to-hast: '^13.2.1'
  'path-to-regexp@6': '^6.3.0'
  'picomatch@2': '^2.3.2'
  'picomatch@4': '^4.0.4'
  rollup: '^4.59.0'
  tar: '^7.5.16'
  'yaml@2': '^2.8.3'
